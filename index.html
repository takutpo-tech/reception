<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受付アップロード</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 15px; }
        input[type="file"] { display: block; width: 100%; padding: 10px; background: #f9f9f9; border: 1px dashed #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background-color: #2ecc71; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #loading { display: none; text-align: center; font-weight: bold; color: #34495e; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>受付アップロード</h2>
    
    <div class="form-group">
        <label>① 受付票の画像（必須）</label>
        <input type="file" id="file1" accept="image/*">
    </div>
    
    <div class="form-group">
        <label>② 商品の画像1（任意）</label>
        <input type="file" id="file2" accept="image/*">
    </div>
    
    <div class="form-group">
        <label>③ 商品の画像2（任意）</label>
        <input type="file" id="file3" accept="image/*">
    </div>
    
    <button id="submitBtn" onclick="uploadImages()">データを送信する</button>
    <div id="loading">処理中... しばらくお待ちください...</div>
</div>

<script>
// 【重要】ここに先ほどの新しい「全員公開のGASウェブアプリURL」を貼り付けてください
const GAS_URL = "https://script.google.com/macros/s/AKfycbwDCFsKKq0jjl7zpqwrajP_4l6KB8R7sfqyiX0vqiQR06hOTAn1yla8sFVDrly8eGPrnw/exec";

// 画像をBase64に変換する関数
function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        if (!file) resolve(null);
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
    });
}

async function uploadImages() {
    const file1 = document.getElementById('file1').files[0];
    const file2 = document.getElementById('file2').files[0];
    const file3 = document.getElementById('file3').files[0];
    
    if (!file1) {
        alert('① 受付票の画像は必須です！');
        return;
    }
    
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    btn.disabled = true;
    loading.style.display = 'block';
    
    try {
        // 画像をすべて裏側でBase64形式に変換
        const base64_1 = await fileToBase64(file1);
        const base64_2 = await fileToBase64(file2);
        const base64_3 = await fileToBase64(file3);
        
        // 【まずは受付票(1枚目)を送信する処理】
        // ※複数枚を同時にVertex AIに投げる場合は、GAS側の処理に合わせてここを調整できます。
        // まずは1枚目が確実に届くかテストするためのシンプルな通信です。
        const payload = {
            image: base64_1,
            name: file1.name
        };
        
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        
        if (result.status === 'success') {
            alert(result.message);
            // 成功したらフォームをリセット
            document.getElementById('file1').value = '';
            document.getElementById('file2').value = '';
            document.getElementById('file3').value = '';
        } else {
            alert('エラーが発生しました: ' + result.message);
        }
        
    } catch (error) {
        alert('通信エラーが発生しました: ' + error.toString());
    } finally {
        btn.disabled = false;
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>

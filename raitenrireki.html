<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客データ検索</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 15px; 
            background-color: #f4f6f9; 
            color: #333; 
            margin: 0; 
        }
        h2 { 
            font-size: 1.2em; 
            margin-top: 5px;
            margin-bottom: 15px; 
            color: #111;
        }
        .search-box { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 20px; 
        }
        input[type="text"] { 
            flex: 1; 
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box;
        }
        button { 
            padding: 12px 20px; 
            font-size: 16px; 
            background-color: #06C755; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer;
        }
        button:active {
            background-color: #05a647;
        }
        .result-card { 
            background: white; 
            padding: 16px; 
            border-radius: 8px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); 
            margin-bottom: 15px; 
            border-left: 5px solid #007AFF; 
        }
        .result-header { 
            font-weight: bold; 
            font-size: 1.1em; 
            margin-bottom: 12px; 
            border-bottom: 1px solid #f0f0f0; 
            padding-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .status-badge { 
            font-size: 0.8em; 
            padding: 3px 8px; 
            border-radius: 4px; 
            color: white; 
            font-weight: bold;
        }
        .status-success { background-color: #28a745; } 
        .status-danger { background-color: #dc3545; }  
        .status-unknown { background-color: #6c757d; } 
        
        .info-grid { 
            display: grid; 
            grid-template-columns: 90px 1fr; 
            gap: 12px 10px; 
            font-size: 1em; 
            line-height: 1.4;
            align-items: center;
        }
        .label { 
            color: #666; 
            font-weight: bold; 
        }
        
        .img-view-btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 14px;
            background-color: #f1f5f9;
            color: #007AFF;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95em;
            cursor: pointer;
        }
        .img-view-btn:active {
            background-color: #e2e8f0;
        }

        /* ポップアップ表示用スタイル */
        .image-modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9); 
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            max-width: 95%;
            max-height: 80%;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            object-fit: contain;
        }
        .close-hint {
            position: absolute;
            bottom: 40px;
            color: #fff;
            font-size: 0.95em;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }

        .loading { 
            text-align: center; 
            color: #666; 
            margin-top: 30px; 
            font-size: 0.95em;
        }
        .error-msg {
            color: #dc3545;
            text-align: center;
            padding: 20px;
        }
    </style>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

    <h2>顧客データ検索</h2>
    <div class="search-box">
        <input type="text" id="customerName" placeholder="顧客名を入力">
        <button onclick="searchCustomer()">検索</button>
    </div>

    <div id="loading" class="loading" style="display: none;">データを検索中...</div>
    <div id="resultContainer"></div>

    <div id="photoModal" class="image-modal" onclick="closeModal()">
        <img id="modalImage" class="modal-content" src="" alt="受付票画像">
        <div class="close-hint">タップして閉じる</div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzax8r52bNxLxPlyotNix4LLPrZljeQxkjRwYfaGHlP6Yo8FTfTzoQc9QA748DGnkLSmg/exec";
        const LIFF_ID = "2010292787-THrXgcKd"; 

        let userLineId = "";
        let currentImages = {}; // 画像データを一時保持する用

        window.onload = function() {
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (liff.isLoggedIn()) {
                    liff.getProfile().then(profile => {
                        userLineId = profile.userId;
                    });
                } else {
                    liff.login(); 
                }
            }).catch((err) => {
                console.error("LIFF初期化失敗", err);
                document.getElementById("resultContainer").innerHTML = "<p class='error-msg'>LIFFの初期化に失敗しました。</p>";
            });
        };

        async function searchCustomer() {
            const name = document.getElementById("customerName").value.trim();
            const resultContainer = document.getElementById("resultContainer");
            const loading = document.getElementById("loading");

            if (!name) {
                alert("顧客名を入力してください");
                return;
            }
            if (!userLineId) {
                alert("LINE IDが取得できていません。");
                return;
            }

            resultContainer.innerHTML = "";
            loading.style.display = "block";
            currentImages = {}; // キャッシュリセット

            try {
                const response = await fetch(`${GAS_URL}?name=${encodeURIComponent(name)}&userId=${userLineId}`);
                const data = await response.json();

                loading.style.display = "none";

                if (data.error) {
                    resultContainer.innerHTML = `<p class='error-msg'>${data.error}</p>`;
                    return;
                }

                if (data.length === 0) {
                    resultContainer.innerHTML = "<p style='text-align:center; color:#999; margin-top:30px;'>該当する顧客データが見つかりませんでした。</p>";
                    return;
                }

                data.forEach((item, index) => {
                    let statusClass = "status-unknown";
                    if (item.status) {
                        if (item.status.indexOf("不成約") !== -1) {
                            statusClass = "status-danger";
                        } else if (item.status.indexOf("成約") !== -1) {
                            statusClass = "status-success";
                        }
                    }

                    let imageHtml = "-";
                    if (item.imageData) {
                        if (item.imageData === "error") {
                            imageHtml = "<span style='color:#dc3545; font-size:0.9em;'>⚠ 画像の取得権限がありません</span>";
                        } else {
                            // 一時オブジェクトに画像データを格納してインデックスで呼び出す
                            currentImages[index] = item.imageData;
                            imageHtml = `<button type="button" class="img-view-btn" onclick="openModal(${index})">👁 画像を表示</button>`;
                        }
                    }

                    const itemHtml = `
                        <div class="result-card">
                            <div class="result-header">
                                <span>👤 ${item.name} 様</span>
                                <span class="status-badge ${statusClass}">${item.status || '未入力'}</span>
                            </div>
                            <div class="info-grid">
                                <div class="label">来店日時</div><div class="value">${item.dateTime || '-'}</div>
                                <div class="label">受付票画像</div><div class="value">${imageHtml}</div>
                            </div>
                        </div>
                    `;
                    resultContainer.insertAdjacentHTML('beforeend', itemHtml);
                });

            } catch (error) {
                loading.style.display = "none";
                alert("データの取得に失敗しました。");
                console.error(error);
            }
        }

        // ポップアップを開く
        function openModal(index) {
            const modal = document.getElementById("photoModal");
            const modalImg = document.getElementById("modalImage");
            
            if (currentImages[index]) {
                modalImg.src = currentImages[index]; // Base64データをそのまま流し込む
                modal.style.display = "flex";
            }
        }

        // ポップアップを閉じる
        function closeModal() {
            const modal = document.getElementById("photoModal");
            modal.style.display = "none";
            document.getElementById("modalImage").src = ""; 
        }
    </script>
</body>
</html>

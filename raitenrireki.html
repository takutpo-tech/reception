<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客データ検索</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 15px; 
            background-color: #f4f6f9; 
            color: #333; 
            margin: 0; 
        }
        h2 { 
            font-size: 1.2em; 
            margin-top: 5px;
            margin-bottom: 15px; 
            color: #111;
        }
        .search-box { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 20px; 
        }
        input[type="text"] { 
            flex: 1; 
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box;
        }
        button { 
            padding: 12px 20px; 
            font-size: 16px; 
            background-color: #06C755; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer;
        }
        button:active {
            background-color: #05a647;
        }
        .result-card { 
            background: white; 
            padding: 16px; 
            border-radius: 8px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); 
            margin-bottom: 15px; 
            border-left: 5px solid #007AFF; 
        }
        .result-header { 
            font-weight: bold; 
            font-size: 1.1em; 
            margin-bottom: 12px; 
            border-bottom: 1px solid #f0f0f0; 
            padding-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .status-badge { 
            font-size: 0.8em; 
            padding: 3px 8px; 
            border-radius: 4px; 
            color: white; 
            font-weight: bold;
        }
        .status-success { background-color: #28a745; } 
        .status-danger { background-color: #dc3545; }  
        .status-unknown { background-color: #6c757d; } 
        
        .info-grid { 
            display: grid; 
            grid-template-columns: 90px 1fr; 
            gap: 12px 10px; 
            font-size: 1em; 
            line-height: 1.4;
            align-items: center;
        }
        .label { 
            color: #666; 
            font-weight: bold; 
        }
        .value {
            color: #222;
        }
        /* 画像リンクボタンの装飾 */
        .img-link-btn {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            background-color: #f1f5f9;
            color: #007AFF;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9em;
            border: 1px solid #cbd5e1;
        }
        .img-link-btn:active {
            background-color: #e2e8f0;
        }
        .loading { 
            text-align: center; 
            color: #666; 
            margin-top: 30px; 
            font-size: 0.95em;
        }
        .error-msg {
            color: #dc3545;
            text-align: center;
            padding: 20px;
        }
    </style>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

    <h2>顧客データ検索</h2>
    <div class="search-box">
        <input type="text" id="customerName" placeholder="顧客名を入力">
        <button onclick="searchCustomer()">検索</button>
    </div>

    <div id="loading" class="loading" style="display: none;">データを検索中...</div>
    <div id="resultContainer"></div>

    <script>
        // ★ご自身のURLとIDに書き換えてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuEn55V71sEiPfLn09jnrxGyzQ4uNyElkJVu3FA4TlZgg9BEXP1jLBsTSgssJ8ABPxEQ/exec";
        const LIFF_ID = "2010292787-THrXgcKd"; 

        let userLineId = "";

        window.onload = function() {
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (liff.isLoggedIn()) {
                    liff.getProfile().then(profile => {
                        userLineId = profile.userId;
                    });
                } else {
                    liff.login(); 
                }
            }).catch((err) => {
                console.error("LIFF初期化失敗", err);
                document.getElementById("resultContainer").innerHTML = "<p class='error-msg'>LIFFの初期化に失敗しました。</p>";
            });
        };

        async function searchCustomer() {
            const name = document.getElementById("customerName").value.trim();
            const resultContainer = document.getElementById("resultContainer");
            const loading = document.getElementById("loading");

            if (!name) {
                alert("顧客名を入力してください");
                return;
            }
            if (!userLineId) {
                alert("LINE IDが取得できていません。");
                return;
            }

            resultContainer.innerHTML = "";
            loading.style.display = "block";

            try {
                const response = await fetch(`${GAS_URL}?name=${encodeURIComponent(name)}&userId=${userLineId}`);
                const data = await response.json();

                loading.style.display = "none";

                if (data.error) {
                    resultContainer.innerHTML = `<p class='error-msg'>${data.error}</p>`;
                    return;
                }

                if (data.length === 0) {
                    resultContainer.innerHTML = "<p style='text-align:center; color:#999; margin-top:30px;'>該当する顧客データが見つかりませんでした。</p>";
                    return;
                }

                data.forEach(item => {
                    let statusClass = "status-unknown";
                    if (item.status) {
                        if (item.status.indexOf("不成約") !== -1) {
                            statusClass = "status-danger";
                        } else if (item.status.indexOf("成約") !== -1) {
                            statusClass = "status-success";
                        }
                    }

                    // 画像URLがある場合のみボタンを表示、ない場合は「-」
                    let imageHtml = "-";
                    if (item.imageUrl && item.imageUrl.startsWith("http")) {
                        imageHtml = `<a href="${item.imageUrl}" target="_blank" class="img-link-btn">📄 画像を開く</a>`;
                    }

                    const itemHtml = `
                        <div class="result-card">
                            <div class="result-header">
                                <span>👤 ${item.name} 様</span>
                                <span class="status-badge ${statusClass}">${item.status || '未入力'}</span>
                            </div>
                            <div class="info-grid">
                                <div class="label">来店日時</div><div class="value">${item.dateTime || '-'}</div>
                                <div class="label">受付票画像</div><div class="value">${imageHtml}</div>
                            </div>
                        </div>
                    `;
                    resultContainer.insertAdjacentHTML('beforeend', itemHtml);
                });

            } catch (error) {
                loading.style.display = "none";
                alert("データの取得に失敗しました。");
                console.error(error);
            }
        }
    </script>
</body>
</html>

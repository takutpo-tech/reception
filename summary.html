<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>本日の買取サマリー</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* 画面全体の基本設定：余白をなくし背景をシンプルに */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px 16px;
            color: #000000;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* ローディング画面 */
        #loading {
            text-align: center;
            padding: 40px 0;
            font-size: 14px;
            color: #666;
        }
        .spinner {
            width: 26px;
            height: 26px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #000000;
            border-radius: 50%;
            margin: 0 auto 12px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 💡イメージ通りに極限まで調整したカスタムレイアウト */
        .summary-box {
            display: none; /* 初期状態は非表示 */
            width: 100%;
        }

        /* 日付エリアのスタイル */
        .date-header {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        /* テーブルの共通設定 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 28px;
        }
        
        /* 上下の太い黒線 */
        .main-table {
            border-top: 2px solid #000000;
            border-bottom: 2px solid #000000;
        }

        td {
            padding: 12px 6px;
            font-size: 18px;
            font-weight: bold;
            color: #000000;
        }

        /* 細いドットの区切り線 */
        .main-table td {
            border-bottom: 1px dotted #999999;
        }
        .main-table tr:last-child td {
            border-bottom: none; /* 一番下の行のドット線は消す */
        }

        /* 列ごとの配置・幅の固定（文字と数字が綺麗に揃うように調整） */
        .col-label {
            text-align: left;
            width: 30%;
            padding-left: 35px; /* 左側に絶妙な余白 */
        }
        .col-value {
            text-align: right;
            width: 70%;
            padding-right: 35px; /* 右側に絶妙な余白 */
            font-variant-numeric: tabular-nums;
        }

        /* 3列構成（振込依頼・現金用意）用の細かな位置調整 */
        .triple-row td {
            border-bottom: 1px dotted #CCCCCC;
        }
        .triple-row tr:nth-child(2) td, 
        .triple-row tr:last-child td {
            border-bottom: none; /* 合計と明日の間のドット線を調整 */
        }
        .col-3-1 { text-align: left; width: 30%; padding-left: 15px; }
        .col-3-2 { text-align: center; width: 20%; color: #000000; }
        .col-3-3 { text-align: right; width: 50%; padding-right: 15px; font-variant-numeric: tabular-nums; }

        /* 💡一番下の「現金差異」専用：上下の太い緑線 */
        .diff-table {
            border-top: 2px solid #4CAF50;
            border-bottom: 2px solid #4CAF50;
            margin-top: 10px;
        }
        .diff-table td {
            padding: 14px 6px;
        }
        .col-diff-label {
            text-align: left;
            width: 40%;
            padding-left: 25px;
            color: #000000;
        }
        .col-diff-value {
            text-align: center;
            width: 60%;
            color: #000000;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="loading">
        <div class="spinner"></div>
        データを読み込み中...
    </div>

    <div id="summaryBox" class="summary-box">
        <div id="dateHeader" class="date-header"></div>

        <table class="main-table">
            <tbody id="mainTableBody">
                </tbody>
        </table>

        <table class="triple-row">
            <tbody id="subTableBody">
                </tbody>
        </table>

        <table class="diff-table">
            <tbody>
                <tr>
                    <td id="diffLabel" class="col-diff-label">現金差異</td>
                    <td id="diffValue" class="col-diff-value">￥0 差異無し</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
// 🔑 【要設定】
const LIFF_ID = "2010292787-ZmmtDZh0"; 
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbycrdSScnT8wAkhPvreBgjf4woMwLzATUTBT2t8DvMkRC0tTykCjrb5NZVPZ0Y2bS5z/exec";

// 💡 Google特有の変な日付文字を「26.6/05」形式に超綺麗に変換する職人ロジック
function formatGoogleDate(dateStr) {
    if (!dateStr) return "26.6/05"; 
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr; 
    
    const yy = d.getFullYear().toString().slice(-2);
    const mm = d.getMonth() + 1;
    const dd = d.getDate().toString().padStart(2, '0'); 
    
    return `${yy}.${mm}/${dd}`;
}

// 🚀 LIFFの初期化とLINE IDの取得からすべてを始めるメイン処理
async function initializeLiff() {
    try {
        // LIFFの初期化
        await liff.init({ liffId: LIFF_ID });
        
        // LINE内ブラウザ、または外部ブラウザでログインしていなければログインさせる
        if (!liff.isLoggedIn()) {
            liff.login();
            return;
        }

        // 👤 開いたユーザーのLINEプロフィール（ID含む）を取得
        const profile = await liff.getProfile();
        const lineId = profile.userId; // これが暗号のようなLINE ID

        // IDを持ってサマリーデータの自動読み込みへ進む
        await fetchSummary(lineId);

    } catch (error) {
        document.getElementById('loading').innerHTML = `<span style="color:red;">LINE連携(LIFF)の初期化に失敗しました。</span>`;
        console.error("LIFFエラー:", error);
    }
}

// 📊 親玉GASから本人のスプレッドシートデータを引っ張ってきて画面を描く処理
async function fetchSummary(lineId) {
    try {
        // 💡 【修正ポイント】URLの末尾に「?lineId=現在のユーザーID」を自動でくっつける！
        const response = await fetch(`${GAS_API_URL}?lineId=${lineId}`);
        const json = await response.json();
        const matrix = json.data; // B2:G16 の2次元配列

        if (!matrix || matrix.length === 0) {
            throw new Error("データが空か、マスタに登録がない可能性があります。");
        }

        // 1. 日付のセット (B2セル) + 確認用に名前を少し付け足す演出も可能
        const rawDate = matrix[0][0];
        const titleText = formatGoogleDate(rawDate);
        document.getElementById('dateHeader').textContent = json.senderName ? `${titleText} (${json.senderName})` : titleText;

        // 2. メインテーブル (来店〜粗利率) の組み立て
        const mainTableBody = document.getElementById('mainTableBody');
        mainTableBody.innerHTML = '';
        
        const mainRows = [
            { label: '来店', val: matrix[1][1], unit: ' 客' },
            { label: '成約', val: matrix[3][1], unit: ' 客', extra: `成約率  ${typeof matrix[3][4] === 'number' ? (matrix[3][4] * 100).toFixed(1) : "0.0"} %` },
            { label: '買取額', val: matrix[4][1], unit: ' 円' },
            { label: '卸予定額', val: matrix[5][1], unit: ' 円' },
            { label: '見込粗利', val: matrix[6][1], unit: ' 円' },
            { label: '粗利率', val: typeof matrix[7][1] === 'number' ? `${(matrix[7][1] * 100).toFixed(1)} %` : matrix[7][1], unit: '' }
        ];

        mainRows.forEach(row => {
            const tr = document.createElement('tr');
            
            const tdLabel = document.createElement('td');
            tdLabel.className = 'col-label';
            tdLabel.textContent = row.label;
            
            const tdValue = document.createElement('td');
            tdValue.className = 'col-value';
            
            let displayVal = row.val;
            if (typeof displayVal === 'number' && row.label !== '粗利率') {
                displayVal = displayVal.toLocaleString();
            }
            
            if (row.extra) {
                tdValue.innerHTML = `${displayVal}${row.unit} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${row.extra}`;
            } else {
                tdValue.textContent = `${displayVal}${row.unit}`;
            }
            
            tr.appendChild(tdLabel);
            tr.appendChild(tdValue);
            mainTableBody.appendChild(tr);
        });

        // 3. サブテーブル (振込依頼・現金用意) の組み立て
        const subTableBody = document.getElementById('subTableBody');
        subTableBody.innerHTML = '';

        const subRows = [
            { group: '振込依頼', type: '合計', count: matrix[9][2], price: matrix[9][3] },
            { group: '',         type: '明日', count: matrix[10][2], price: matrix[10][3] },
            { group: '現金用意', type: '合計', count: matrix[11][2], price: matrix[11][3] },
            { group: '',         type: '明日', count: matrix[12][2], price: matrix[12][3] }
        ];

        subRows.forEach(row => {
            const tr = document.createElement('tr');
            
            const tdGroup = document.createElement('td');
            tdGroup.className = 'col-3-1';
            tdGroup.textContent = row.group;
            
            const tdType = document.createElement('td');
            tdType.className = 'col-3-2';
            tdType.textContent = row.type;
            
            const tdData = document.createElement('td');
            tdData.className = 'col-3-3';
            
            const cStr = typeof row.count === 'number' ? row.count : 0;
            const pStr = typeof row.price === 'number' ? row.price.toLocaleString() : row.price;
            tdData.textContent = `${cStr} 件       ${pStr} 円`;
            
            tr.appendChild(tdGroup);
            tr.appendChild(tdType);
            tr.appendChild(tdData);
            subTableBody.appendChild(tr);
        });

        // 4. 現金差異のセット (B16・D16セル付近)
        document.getElementById('diffLabel').textContent = matrix[14][0] || "現金差異";
        document.getElementById('diffValue').textContent = matrix[14][2] || "￥0 差異無し";

        // 表示の切り替え
        document.getElementById('loading').style.display = 'none';
        document.getElementById('summaryBox').style.display = 'block';

    } catch (error) {
        document.getElementById('loading').innerHTML = `<span style="color:red;">データの取得・描画に失敗しました。</span>`;
        console.error(error);
    }
}

// 🎬 ページを開いた瞬間にLIFF制御をスタートさせる
initializeLiff();
</script>

</body>
</html>

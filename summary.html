<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>本日の買取サマリー</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px 16px;
            color: #000000;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        #loading {
            text-align: center;
            padding: 40px 0;
            font-size: 14px;
            color: #666;
        }
        .spinner {
            width: 26px;
            height: 26px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #000000;
            border-radius: 50%;
            margin: 0 auto 12px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .summary-box {
            display: none;
            width: 100%;
        }
        .date-header {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-left: 15px; /* 見出しの頭揃え位置に合わせる */
        }
        
        /* 📋 全テーブル共通の基本ルール */
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* 列の幅を％で完全に固定するおまじない */
        }
        td {
            padding: 12px 0;
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            vertical-align: middle;
        }

        /* 1️⃣ メインテーブル（来店〜粗利率） */
        .main-table {
            border-top: 2px solid #000000;
            border-bottom: 2px solid #000000; /* 粗利率の下の実線 */
            margin-bottom: 20px;
        }
        .main-table td {
            border-bottom: 1px dotted #999999;
        }
        .main-table tr:last-child td {
            border-bottom: none; /* 粗利率のドット線は消して実線を生かす */
        }
        /* 幅の比率: 見出し32% / 残り全部68% */
        .main-col-label { width: 32%; text-align: left; padding-left: 15px; }
        .main-col-value { width: 68%; text-align: right; padding-right: 15px; font-variant-numeric: tabular-nums; }

        /* 2️⃣ サブテーブル（振込依頼・現金用意） */
        .sub-table {
            margin-bottom: 25px;
        }
        .sub-table td {
            border-bottom: 1px dotted #CCCCCC;
        }
        .sub-table tr:nth-child(2) td, 
        .sub-table tr:last-child td {
            border-bottom: none; /* グループごとの区切りをきれいに */
        }
        /* 幅の比率: 大見出し32% / 中見出し15% / 件数18% / 金額右揃え35% */
        .sub-col-1 { width: 32%; text-align: left; padding-left: 15px; } /* 大見出し頭揃え */
        .sub-col-2 { width: 15%; text-align: left; }  /* 合計・明日をもっと左へ */
        .sub-col-3 { width: 18%; text-align: left; }  /* 件数の位置を4つ完全に統一 */
        .sub-col-4 { width: 35%; text-align: right; padding-right: 15px; font-variant-numeric: tabular-nums; } /* 右端に右揃え */

        /* 3️⃣ 現金差異テーブル */
        .diff-table {
            border-top: 2px solid #4CAF50;
            border-bottom: 2px solid #4CAF50;
        }
        .diff-table td {
            padding: 14px 0;
        }
        /* 現金差異は「少し右に」するため、padding-leftを15px→25pxに微調整 */
        .diff-col-label { width: 32%; text-align: left; padding-left: 25px; }
        .diff-col-value { width: 68%; text-align: right; padding-right: 15px; } /* 現状の位置（右揃え）をキープ */
    </style>
</head>
<body>

<div class="container">
    <div id="loading">
        <div class="spinner"></div>
        データを読み込み中...
    </div>

    <div id="summaryBox" class="summary-box">
        <div id="dateHeader" class="date-header"></div>

        <table class="main-table">
            <colgroup>
                <col class="main-col-label">
                <col class="main-col-value">
            </colgroup>
            <tbody id="mainTableBody"></tbody>
        </table>

        <table class="sub-table">
            <colgroup>
                <col class="sub-col-1">
                <col class="sub-col-2">
                <col class="sub-col-3">
                <col class="sub-col-4">
            </colgroup>
            <tbody id="subTableBody"></tbody>
        </table>

        <table class="diff-table">
            <colgroup>
                <col class="diff-col-label">
                <col class="diff-col-value">
            </colgroup>
            <tbody>
                <tr>
                    <td id="diffLabel">現金差異</td>
                    <td id="diffValue">￥0 差異無し</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
// 🔑 【要設定】ご自身のLIFF IDに書き換えてください
const LIFF_ID = "2010292787-ZmmtDZh0"; 
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbymT49eX1DFgCQJNE2oBhrx0lmX8xAq_h8WsxIYlaNWwUsWteMZVdDe5CcP-76iCA_f/exec";

function formatGoogleDate(dateStr) {
    if (!dateStr) return "26.6/05"; 
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr; 
    
    const yy = d.getFullYear().toString().slice(-2);
    const mm = d.getMonth() + 1;
    const dd = d.getDate().toString().padStart(2, '0'); 
    
    return `${yy}.${mm}/${dd}`;
}

async function initializeLiff() {
    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
            liff.login();
            return;
        }
        const profile = await liff.getProfile();
        await fetchSummary(profile.userId);
    } catch (error) {
        document.getElementById('loading').innerHTML = `<span style="color:red;">LINE連携(LIFF)の初期化に失敗しました。</span>`;
        console.error(error);
    }
}

async function fetchSummary(lineId) {
    try {
        const response = await fetch(`${GAS_API_URL}?lineId=${lineId}`);
        const json = await response.json();
        const matrix = json.data; 

        if (!matrix || matrix.length === 0) {
            throw new Error("データが空か、マスタに登録がない可能性があります。");
        }

        // 1. 日付のセット (B2セル)
        const rawDate = matrix[0][0];
        document.getElementById('dateHeader').textContent = formatGoogleDate(rawDate);

        // 2. メインテーブル (来店〜粗利率) の組み立て
        const mainTableBody = document.getElementById('mainTableBody');
        mainTableBody.innerHTML = '';
        
        let contractValueText = "";
        if (matrix[3] && matrix[3][1] !== undefined) {
            contractValueText = `${matrix[3][1]} 客`;
            if (typeof matrix[3][4] === 'number') {
                const rate = (matrix[3][4] * 100).toFixed(1);
                contractValueText += ` &nbsp;&nbsp;&nbsp;&nbsp; 成約率 ${rate} %`;
            }
        }

        const mainRows = [
            { label: '来店', val: (matrix[1] && typeof matrix[1][1] === 'number') ? `${matrix[1][1].toLocaleString()} 客` : `${(matrix[1] ? matrix[1][1] : 0)} 客` },
            { label: '成約', val: contractValueText, isHtml: true },
            { label: '買取額', val: (matrix[4] && typeof matrix[4][1] === 'number') ? `${matrix[4][1].toLocaleString()} 円` : `${(matrix[4] ? matrix[4][1] : 0)} 円` },
            { label: '卸予定額', val: (matrix[5] && typeof matrix[5][1] === 'number') ? `${matrix[5][1].toLocaleString()} 円` : `${(matrix[5] ? matrix[5][1] : 0)} 円` },
            { label: '見込粗利', val: (matrix[6] && typeof matrix[6][1] === 'number') ? `${matrix[6][1].toLocaleString()} 円` : `${(matrix[6] ? matrix[6][1] : 0)} 円` },
            { label: '粗利率', val: (matrix[7] && typeof matrix[7][1] === 'number') ? `${(matrix[7][1] * 100).toFixed(1)} %` : (matrix[7] ? matrix[7][1] : '0.0 %') }
        ];

        mainRows.forEach(row => {
            const tr = document.createElement('tr');
            const tdLabel = document.createElement('td');
            tdLabel.textContent = row.label;
            
            const tdValue = document.createElement('td');
            if (row.isHtml) {
                tdValue.innerHTML = row.val;
            } else {
                tdValue.textContent = row.val;
            }
            tr.appendChild(tdLabel);
            tr.appendChild(tdValue);
            mainTableBody.appendChild(tr);
        });

        // 3. サブテーブル (振込依頼・現金用意) の組み立て
        const subTableBody = document.getElementById('subTableBody');
        subTableBody.innerHTML = '';

        const subRows = [
            { group: '振込依頼', type: '合計', count: matrix[9] ? matrix[9][2] : 0, price: matrix[9] ? matrix[9][3] : 0 },
            { group: '',         type: '明日', count: matrix[10] ? matrix[10][2] : 0, price: matrix[10] ? matrix[10][3] : 0 },
            { group: '現金用意', type: '合計', count: matrix[11] ? matrix[11][2] : 0, price: matrix[11] ? matrix[11][3] : 0 },
            { group: '',         type: '明日', count: matrix[12] ? matrix[12][2] : 0, price: matrix[12] ? matrix[12][3] : 0 }
        ];

        subRows.forEach(row => {
            const tr = document.createElement('tr');
            
            // 各セルの生成
            const tdGroup = document.createElement('td');
            tdGroup.textContent = row.group;
            
            const tdType = document.createElement('td');
            tdType.textContent = row.type;
            
            const tdCount = document.createElement('td');
            const cStr = typeof row.count === 'number' ? row.count : 0;
            tdCount.textContent = `${cStr} 件`;
            
            const tdPrice = document.createElement('td');
            const pStr = typeof row.price === 'number' ? row.price.toLocaleString() : 0;
            tdPrice.textContent = `${pStr} 円`;
            
            tr.appendChild(tdGroup);
            tr.appendChild(tdType);
            tr.appendChild(tdCount);
            tr.appendChild(tdPrice);
            subTableBody.appendChild(tr);
        });

        // 4. 現金差異のセット
        if (matrix[14]) {
            document.getElementById('diffLabel').textContent = matrix[14][0] || "現金差異";
            document.getElementById('diffValue').textContent = matrix[14][2] || "￥0 差異無し";
        }

        // 表示の切り替え
        document.getElementById('loading').style.display = 'none';
        document.getElementById('summaryBox').style.display = 'block';

    } catch (error) {
        document.getElementById('loading').innerHTML = `<span style="color:red;">データの取得・描画に失敗しました。</span>`;
        console.error(error);
    }
}

initializeLiff();
</script>

</body>
</html>

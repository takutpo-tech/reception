<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受付票アップロード</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 15px; color: #333; margin: 0; position: relative; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; font-size: 22px; margin-top: 5px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
        
        /* 横並び用のコンテナ（外枠は廃止） */
        .upload-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            padding: 5px 0;
        }
        
        /* 「画像を選択」ボタン：文字に合わせたコンパクトな幅に調整 */
        .file-select-btn {
            display: inline-block;
            background-color: #34495e;
            color: white;
            text-align: center;
            padding: 10px 15px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap; /* 文字の折り返しを防止 */
        }
        .file-select-btn:hover { background-color: #2c3e50; }
        .file-select-btn input[type="file"] { display: none; }
        
        /* ラベルの行にもかかるよう、サイズを少し大きく（90px）した固定画像枠 */
        .thumbnail-box {
            width: 90px;
            height: 90px;
            border: 2px dashed #ccc;
            border-radius: 6px;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            margin-top: -20px; /* 上のラベル行側へ少し食い込ませる配置調整 */
        }
        
        /* 枠内のプレビュー画像 */
        .thumbnail-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 2;
        }
        
        /* 未選択時の文字表示 */
        .thumbnail-box::before {
            content: "未選択";
            font-size: 11px;
            color: #aaa;
            position: absolute;
            z-index: 1;
        }
        .thumbnail-box.has-image::before {
            display: none;
        }

        button#submitBtn { width: 100%; background-color: #2ecc71; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s, opacity 0.5s; margin-top: 15px; }
        button#submitBtn:hover { background-color: #27ae60; }
        button#submitBtn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #status-group { text-align: center; margin-top: 10px; }
        #loading { display: none; font-weight: bold; color: #34495e; font-size: 14px; }
        
        /* 完了バナー */
        #completion-banner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 350px;
            background-color: white;
            color: #2ecc71;
            border: 2px solid #2ecc71;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

<div id="completion-banner">
    ✨ 送信完了しました ✨
</div>

<div class="container">
    <h2>受付票アップロード</h2>
    
    <div class="form-group">
        <label>① 受付票の画像</label>
        <div class="upload-row">
            <label class="file-select-btn">
                画像を選択
                <input type="file" id="file1" accept="image/*" onchange="previewImage(this, 'preview1', 'box1')">
            </label>
            <div class="thumbnail-box" id="box1">
                <img id="preview1" src="" alt="プレビュー">
            </div>
        </div>
    </div>
    
    <div class="form-group">
        <label>② 商品画像①</label>
        <div class="upload-row">
            <label class="file-select-btn">
                画像を選択
                <input type="file" id="file2" accept="image/*" onchange="previewImage(this, 'preview2', 'box2')">
            </label>
            <div class="thumbnail-box" id="box2">
                <img id="preview2" src="" alt="プレビュー">
            </div>
        </div>
    </div>
    
    <div class="form-group">
        <label>③ 商品画像②</label>
        <div class="upload-row">
            <label class="file-select-btn">
                画像を選択
                <input type="file" id="file3" accept="image/*" onchange="previewImage(this, 'preview3', 'box3')">
            </label>
            <div class="thumbnail-box" id="box3">
                <img id="preview3" src="" alt="プレビュー">
            </div>
        </div>
    </div>
    
    <button id="submitBtn" onclick="uploadImages()">データを送信する</button>
    <div id="status-group">
        <div id="loading">処理中... しばらくお待ちください...</div>
    </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyLablfy4U1oaCYUHhr1YurSoLxjkBc3i7OZ73Hu6geT-NLGR-0hljwwqNTI2Pkc5mD/exec";

let globalLineId = null;

window.onload = function() {
    liff.init({ liffId: "2010292787-nAxhQtMo" })
        .then(() => {
            if (liff.isLoggedIn()) {
                return liff.getProfile();
            } else {
                liff.login();
            }
        })
        .then(profile => {
            if (profile) {
                globalLineId = profile.userId;
            }
        })
        .catch(err => {
            alert("LINE初期化エラー: " + err.toString());
        });
};

function previewImage(input, previewId, boxId) {
    const preview = document.getElementById(previewId);
    const box = document.getElementById(boxId);
    const file = input.files[0];
    
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'block';
            box.classList.add('has-image');
        }
        reader.readAsDataURL(file);
    } else {
        preview.src = '';
        preview.style.display = 'none';
        box.classList.remove('has-image');
    }
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        if (!file) resolve(null);
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
    });
}

function showCompletionBanner() {
    const banner = document.getElementById('completion-banner');
    banner.style.display = 'block';
    banner.style.opacity = '1';

    setTimeout(() => {
        banner.style.opacity = '0';
        setTimeout(() => {
            banner.style.display = 'none';
        }, 500);
    }, 5000);
}

async function uploadImages() {
    const file1 = document.getElementById('file1').files[0];
    const file2 = document.getElementById('file2').files[0];
    const file3 = document.getElementById('file3').files[0];
    
    if (!file1) {
        alert('① 受付票の画像は必須です！');
        return;
    }
    
    if (!globalLineId) {
        alert('エラー: LINE IDがまだ読み込まれていません。一瞬待ってから再度お試しください。');
        return;
    }
    
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const banner = document.getElementById('completion-banner');
    
    btn.disabled = true;
    loading.style.display = 'block';
    banner.style.display = 'none';
    
    try {
        const filesToSend = [];

        const base64_1 = await fileToBase64(file1);
        filesToSend.push({
            image: base64_1,
            name: file1.name,
            type: "1"
        });

        if (file2) {
            const base64_2 = await fileToBase64(file2);
            filesToSend.push({
                image: base64_2,
                name: file2.name,
                type: "2"
            });
        }

        if (file3) {
            const base64_3 = await fileToBase64(file3);
            filesToSend.push({
                image: base64_3,
                name: file3.name,
                type: "3"
            });
        }
        
        const payload = {
            lineId: globalLineId,
            files: filesToSend
        };
        
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'text/plain'
            },
            body: JSON.stringify(payload)
        });
        
        showCompletionBanner();
        
        document.getElementById('file1').value = '';
        document.getElementById('file2').value = '';
        document.getElementById('file3').value = '';
        
        ['preview1', 'preview2', 'preview3'].forEach(id => {
            document.getElementById(id).style.display = 'none';
            document.getElementById(id).src = '';
        });
        ['box1', 'box2', 'box3'].forEach(id => {
            document.getElementById(id).classList.remove('has-image');
        });
        
    } catch (error) {
        alert('通信エラーが発生しました: ' + error.toString());
    } finally {
        btn.disabled = false;
        loading.style.display = 'none';
    }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受付アップロード</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; margin: 0; position: relative; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 15px; }
        input[type="file"] { display: block; width: 100%; padding: 10px; background: #f9f9f9; border: 1px dashed #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background-color: #2ecc71; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s, opacity 0.5s; margin-top: 10px; }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #status-group { text-align: center; margin-top: 15px; }
        #loading { display: none; font-weight: bold; color: #34495e; }
        
        /* 【改良】画面の真ん中に浮かび上がる完了バナー */
        #completion-banner {
            display: none; /* 初期状態は非表示 */
            position: fixed; /* 画面に固定 */
            top: 50%; /* 上から50% */
            left: 50%; /* 左から50% */
            transform: translate(-50%, -50%); /* 完全に真ん中に合わせる */
            width: 80%;
            max-width: 350px;
            background-color: white; /* 清潔感のある白背景 */
            color: #2ecc71; /* 文字は緑色 */
            border: 2px solid #2ecc71; /* 緑の枠線 */
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); /* 高級感のある影 */
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            z-index: 1000; /* 最前面に表示 */
            opacity: 1;
            transition: opacity 0.5s ease; /* フェードアウト用 */
        }
    </style>
</head>
<body>

<div id="completion-banner">
    ✨ 送信完了しました ✨
</div>

<div class="container">
    <h2>受付アップロード</h2>
    
    <div class="form-group">
        <label>① 受付票の画像（必須）</label>
        <input type="file" id="file1" accept="image/*">
    </div>
    
    <div class="form-group">
        <label>② 商品の画像1（任意）</label>
        <input type="file" id="file2" accept="image/*">
    </div>
    
    <div class="form-group">
        <label>③ 商品の画像2（任意）</label>
        <input type="file" id="file3" accept="image/*">
    </div>
    
    <button id="submitBtn" onclick="uploadImages()">データを送信する</button>
    <div id="status-group">
        <div id="loading">処理中... しばらくお待ちください...</div>
    </div>
</div>

<script>
// 最新のGASウェブアプリURL
const GAS_URL = "https://script.google.com/macros/s/AKfycbwPkaspE8DMOXM9Vgvnt9h5Gex_x2kW7NbO4Ba4beUAkPyp3_uwGl0GS-m9gvBQTRUNDA/exec";

// 画像をBase64に変換する関数
function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        if (!file) resolve(null);
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
    });
}

// バナーを中央に表示して5秒後にフェードアウトさせる関数
function showCompletionBanner() {
    const banner = document.getElementById('completion-banner');
    banner.style.display = 'block';
    banner.style.opacity = '1';

    // 5秒（5000ミリ秒）後にフェードアウト開始
    setTimeout(() => {
        banner.style.opacity = '0';
        setTimeout(() => {
            banner.style.display = 'none';
        }, 500);
    }, 5000);
}

async function uploadImages() {
    const file1 = document.getElementById('file1').files[0];
    const file2 = document.getElementById('file2').files[0];
    const file3 = document.getElementById('file3').files[0];
    
    // ① 受付票（必須）のチェック
    if (!file1) {
        alert('① 受付票の画像は必須です！');
        return;
    }
    
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const banner = document.getElementById('completion-banner');
    
    btn.disabled = true;
    loading.style.display = 'block';
    banner.style.display = 'none'; // 新しい送信時はバナーを隠す
    
    try {
        // =================================================================
        // 🔍 【追加】URLのパラメータから「line_id」を自動取得する
        // =================================================================
        const urlParams = new URLSearchParams(window.location.search);
        const lineId = urlParams.get('line_id');

        if (!lineId) {
            alert('エラー: LINE IDが特定できません。LINE公式アカウントからアクセスしてください。');
            return;
        }

        // GASへ送る配列を準備
        const filesToSend = [];

        // ファイル1（必須）の処理
        const base64_1 = await fileToBase64(file1);
        filesToSend.push({
            image: base64_1,
            name: file1.name,
            type: "1" // 受付票
        });

        // ファイル2（任意）があれば処理
        if (file2) {
            const base64_2 = await fileToBase64(file2);
            filesToSend.push({
                image: base64_2,
                name: file2.name,
                type: "2" // 商品画像1
            });
        }

        // ファイル3（任意）があれば処理
        if (file3) {
            const base64_3 = await fileToBase64(file3);
            filesToSend.push({
                image: base64_3,
                name: file3.name,
                type: "3" // 商品画像2
            });
        }
        
        // 複数ファイルを配列に含め、一緒に取得したlineIdを載せる
        const payload = {
            lineId: lineId, // ★ここを追加
            files: filesToSend
        };
        
        // GASのセキュリティ制限を突破するため mode: 'no-cors' で送信
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'text/plain'
            },
            body: JSON.stringify(payload)
        });
        
        // 中央の完了バナーを表示
        showCompletionBanner();
        
        // 成功したらフォームをリセット
        document.getElementById('file1').value = '';
        document.getElementById('file2').value = '';
        document.getElementById('file3').value = '';
        
    } catch (error) {
        alert('通信エラーが発生しました: ' + error.toString());
    } finally {
        btn.disabled = false;
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>

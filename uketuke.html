<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受付アップロード</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; margin: 0; position: relative; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 15px; }
        input[type="file"] { display: block; width: 100%; padding: 10px; background: #f9f9f9; border: 1px dashed #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background-color: #2ecc71; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s, opacity 0.5s; margin-top: 10px; }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #status-group { text-align: center; margin-top: 15px; }
        #loading { display: none; font-weight: bold; color: #34495e; }
        
        /* 画面の真ん中に浮かび上がる完了バナー */
        #completion-banner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 350px;
            background-color: white;
            color: #2ecc71;
            border: 2px solid #2ecc71;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

<div id="completion-banner">
    ✨ 送信完了しました ✨
</div>

<div class="container">
    <h2>受付アップロード</h2>
    
    <div class="form-group">
        <label>① 受付票の画像（必須）</label>
        <input type="file" id="file1" accept="image/*">
    </div>
    
    <div class="form-group">
        <label>② 商品の画像1（任意）</label>
        <input type="file" id="file2" accept="image/*">
    </div>
    
    <div class="form-group">
        <label>③ 商品の画像2（任意）</label>
        <input type="file" id="file3" accept="image/*">
    </div>
    
    <button id="submitBtn" onclick="uploadImages()">データを送信する</button>
    <div id="status-group">
        <div id="loading">処理中... しばらくお待ちください...</div>
    </div>
</div>

<script>
// 最新のGASウェブアプリURL
const GAS_URL = "https://script.google.com/macros/s/AKfycbyLablfy4U1oaCYUHhr1YurSoLxjkBc3i7OZ73Hu6geT-NLGR-0hljwwqNTI2Pkc5mD/exec";

// 画像をBase64に変換する関数
function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        if (!file) resolve(null);
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
    });
}

// バナーを中央に表示して5秒後にフェードアウトさせる関数
function showCompletionBanner() {
    const banner = document.getElementById('completion-banner');
    banner.style.display = 'block';
    banner.style.opacity = '1';

    setTimeout(() => {
        banner.style.opacity = '0';
        setTimeout(() => {
            banner.style.display = 'none';
        }, 500);
    }, 5000);
}

async function uploadImages() {
    const file1 = document.getElementById('file1').files[0];
    const file2 = document.getElementById('file2').files[0];
    const file3 = document.getElementById('file3').files[0];
    
    if (!file1) {
        alert('① 受付票の画像は必須です！');
        return;
    }
    
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const banner = document.getElementById('completion-banner');
    
    btn.disabled = true;
    loading.style.display = 'block';
    banner.style.display = 'none';
    
    try {
        // =================================================================
        // 🔍 【変更】LIFFを起動して、アクセスした人のLINE IDを自動で取得する
        // =================================================================
        let lineId = null;
        try {
            await liff.init({ liffId: "2010292787-nAxhQtMo" }); // スクショのLIFF IDをセット
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                lineId = profile.userId; // ログイン中のユーザーID（Uxxxx...）を取得
            } else {
                liff.login(); // LINEアプリ以外で開かれた場合はログインを促す
                return;
            }
        } catch (liffError) {
            alert('LINE認証に失敗しました: ' + liffError.toString());
            return;
        }

        if (!lineId) {
            alert('エラー: LINE IDが特定できません。');
            return;
        }

        // GASへ送る配列を準備
        const filesToSend = [];

        // ファイル1（必須）の処理
        const base64_1 = await fileToBase64(file1);
        filesToSend.push({
            image: base64_1,
            name: file1.name,
            type: "1"
        });

        // ファイル2（任意）
        if (file2) {
            const base64_2 = await fileToBase64(file2);
            filesToSend.push({
                image: base64_2,
                name: file2.name,
                type: "2"
            });
        }

        // ファイル3（任意）
        if (file3) {
            const base64_3 = await fileToBase64(file3);
            filesToSend.push({
                image: base64_3,
                name: file3.name,
                type: "3"
            });
        }
        
        // 自動取得したlineIdを載せてペイロードを作成
        const payload = {
            lineId: lineId,
            files: filesToSend
        };
        
        // GASへ送信
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'text/plain'
            },
            body: JSON.stringify(payload)
        });
        
        showCompletionBanner();
        
        // フォームをリセット
        document.getElementById('file1').value = '';
        document.getElementById('file2').value = '';
        document.getElementById('file3').value = '';
        
    } catch (error) {
        alert('通信エラーが発生しました: ' + error.toString());
    } finally {
        btn.disabled = false;
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受付表アップロード</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; margin: 0; position: relative; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 15px; }
        
        /* ファイル選択エリアを大きなボタン風にカスタム */
        .file-dropzone {
            display: block;
            position: relative;
            background: #f9f9f9;
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .file-dropzone:hover { background: #f0f3f5; border-color: #b0bfc6; }
        .file-dropzone input[type="file"] { display: none; } /* 本物のインプットは隠す */
        .file-text { font-size: 14px; color: #7f8c8d; font-weight: bold; }
        
        /* サムネイルを大きく綺麗に表示 */
        .thumbnail-container {
            margin-top: 10px;
            text-align: center;
        }
        .thumbnail-container img {
            max-width: 100%;
            max-height: 250px; /* 必要に応じて高さを調整してください */
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: none;
        }

        button { width: 100%; background-color: #2ecc71; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s, opacity 0.5s; margin-top: 10px; }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #status-group { text-align: center; margin-top: 15px; }
        #loading { display: none; font-weight: bold; color: #34495e; }
        
        /* 画面の真ん中に浮かび上がる完了バナー */
        #completion-banner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 350px;
            background-color: white;
            color: #2ecc71;
            border: 2px solid #2ecc71;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

<div id="completion-banner">
    ✨ 送信完了しました ✨
</div>

<div class="container">
    <h2>受付表アップロード</h2>
    
    <div class="form-group">
        <label>① 受付票の画像</label>
        <label class="file-dropzone">
            <span class="file-text">ファイルを選択</span>
            <input type="file" id="file1" accept="image/*" onchange="previewImage(this, 'preview1')">
        </label>
        <div class="thumbnail-container">
            <img id="preview1" src="" alt="プレビュー">
        </div>
    </div>
    
    <div class="form-group">
        <label>② 商品の画像1</label>
        <label class="file-dropzone">
            <span class="file-text">ファイルを選択</span>
            <input type="file" id="file2" accept="image/*" onchange="previewImage(this, 'preview2')">
        </label>
        <div class="thumbnail-container">
            <img id="preview2" src="" alt="プレビュー">
        </div>
    </div>
    
    <div class="form-group">
        <label>③ 商品の画像2</label>
        <label class="file-dropzone">
            <span class="file-text">ファイルを選択</span>
            <input type="file" id="file3" accept="image/*" onchange="previewImage(this, 'preview3')">
        </label>
        <div class="thumbnail-container">
            <img id="preview3" src="" alt="プレビュー">
        </div>
    </div>
    
    <button id="submitBtn" onclick="uploadImages()">データを送信する</button>
    <div id="status-group">
        <div id="loading">処理中... しばらくお待ちください...</div>
    </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyLablfy4U1oaCYUHhr1YurSoLxjkBc3i7OZ73Hu6geT-NLGR-0hljwwqNTI2Pkc5mD/exec";

// グローバル変数としてLINE IDを保持する領域を作っておく
let globalLineId = null;

// 【超重要】画面が開いた瞬間に、裏側で自動的にLINE IDを取得完了させておく安全な初期化
window.onload = function() {
    liff.init({ liffId: "2010292787-nAxhQtMo" })
        .then(() => {
            if (liff.isLoggedIn()) {
                return liff.getProfile();
            } else {
                liff.login();
            }
        })
        .then(profile => {
            if (profile) {
                globalLineId = profile.userId; // 事前にIDをキープ！
            }
        })
        .catch(err => {
            alert("LINE初期化エラー: " + err.toString());
        });
};

// 画像プレビューを大きく表示する処理（ファイル名は出さない）
function previewImage(input, previewId) {
    const preview = document.getElementById(previewId);
    const file = input.files[0];
    
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'inline-block';
        }
        reader.readAsDataURL(file);
    } else {
        preview.src = '';
        preview.style.display = 'none';
    }
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        if (!file) resolve(null);
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
    });
}

function showCompletionBanner() {
    const banner = document.getElementById('completion-banner');
    banner.style.display = 'block';
    banner.style.opacity = '1';

    setTimeout(() => {
        banner.style.opacity = '0';
        setTimeout(() => {
            banner.style.display = 'none';
        }, 500);
    }, 5000);
}

// ボタンを押したときの処理
async function uploadImages() {
    const file1 = document.getElementById('file1').files[0];
    const file2 = document.getElementById('file2').files[0];
    const file3 = document.getElementById('file3').files[0];
    
    if (!file1) {
        alert('① 受付票の画像は必須です！');
        return;
    }
    
    if (!globalLineId) {
        alert('エラー: LINE IDがまだ読み込まれたいません。一瞬待ってから再度お試しください。');
        return;
    }
    
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const banner = document.getElementById('completion-banner');
    
    btn.disabled = true;
    loading.style.display = 'block';
    banner.style.display = 'none';
    
    try {
        const filesToSend = [];

        const base64_1 = await fileToBase64(file1);
        filesToSend.push({
            image: base64_1,
            name: file1.name,
            type: "1"
        });

        if (file2) {
            const base64_2 = await fileToBase64(file2);
            filesToSend.push({
                image: base64_2,
                name: file2.name,
                type: "2"
            });
        }

        if (file3) {
            const base64_3 = await fileToBase64(file3);
            filesToSend.push({
                image: base64_3,
                name: file3.name,
                type: "3"
            });
        }
        
        const payload = {
            lineId: globalLineId,
            files: filesToSend
        };
        
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'text/plain'
            },
            body: JSON.stringify(payload)
        });
        
        showCompletionBanner();
        
        // 送信後にフォームとプレビューをリセット
        document.getElementById('file1').value = '';
        document.getElementById('file2').value = '';
        document.getElementById('file3').value = '';
        document.getElementById('preview1').style.display = 'none';
        document.getElementById('preview2').style.display = 'none';
        document.getElementById('preview3').style.display = 'none';
        
    } catch (error) {
        alert('通信エラーが発生しました: ' + error.toString());
    } finally {
        btn.disabled = false;
        loading.style.display = 'none';
    }
}
</script>
</body>
</html>

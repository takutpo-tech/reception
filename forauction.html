<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ヤフオク商品分析</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8f9fa; padding: 15px; color: #333; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
        
        label { display: block; font-weight: bold; margin-bottom: 12px; font-size: 14px; color: #4a5568; }
        
        .upload-trigger-btn { width: 100%; background-color: #90cdf4; border: none; border-radius: 10px; padding: 15px; text-align: center; font-weight: bold; color: #1a202c; cursor: pointer; transition: all 0.2s; margin-bottom: 20px; box-sizing: border-box; box-shadow: 0 4px 6px rgba(144, 205, 244, 0.3); }
        .upload-trigger-btn:hover { background-color: #63b3ed; }
        
        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .image-upload-box { position: relative; width: 100%; aspect-ratio: 1 / 1; background-color: #f7fafc; border: 1px solid #e2e8f0; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .image-upload-box .icon { font-size: 22px; color: #cbd5e0; }
        .image-upload-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 2; }
        
        textarea { width: 100%; height: 90px; padding: 12px; background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 15px; resize: none; transition: border 0.2s; }
        textarea:focus { border-color: #3182ce; outline: none; background: #fff; }
        
        .form-group { margin-bottom: 25px; }
        
        #submitBtn { width: 100%; background-color: #b794f4; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; margin-top: 10px; box-shadow: 0 4px 6px rgba(183, 148, 244, 0.3); }
        #submitBtn:hover { background-color: #9f7aea; }
        #submitBtn:disabled { background-color: #cbd5e0; cursor: not-allowed; box-shadow: none; }
        
        #loading { display: none; text-align: center; margin-top: 20px; font-weight: bold; color: #4a5568; }
        .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(159,122,234,.3); border-radius: 50%; border-top-color: #9f7aea; animation: spin 1s ease-in-out infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #result-box { display: none; margin-top: 25px; padding: 20px; background-color: #f7fafc; border: 1px solid #e2e8f0; border-radius: 12px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .result-title { font-size: 18px; font-weight: bold; color: #2d3748; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 15px; }
        .result-item { margin-bottom: 15px; }
        .result-label { font-size: 12px; color: #718096; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        .result-value { font-size: 16px; color: #1a202c; font-weight: 500; }
        .price-highlight { font-size: 22px; color: #e53e3e; font-weight: bold; }
        .stars { font-size: 20px; color: #ecc94b; }
        
        #marketBtn { display: block; width: 100%; text-align: center; box-sizing: border-box; background-color: #38a169; color: white; text-decoration: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 8px; margin-top: 15px; transition: background 0.2s; }
        #marketBtn:hover { background-color: #2f855a; }
    </style>
</head>
<body>

<div class="container">
    <h2>ヤフオク商品分析</h2>
    
    <div class="form-group">
        <div class="upload-trigger-btn" onclick="document.getElementById('bulkFiles').click()">
            📸 画像を選択（最大6枚）
        </div>
        <input type="file" id="bulkFiles" accept="image/*" multiple style="display: none;" onchange="handleFileSelect(this)">

        <div class="image-grid">
            <div class="image-upload-box" id="box1"><div class="icon">📷</div></div>
            <div class="image-upload-box" id="box2"><div class="icon">📷</div></div>
            <div class="image-upload-box" id="box3"><div class="icon">📷</div></div>
            <div class="image-upload-box" id="box4"><div class="icon">📷</div></div>
            <div class="image-upload-box" id="box5"><div class="icon">📷</div></div>
            <div class="image-upload-box" id="box6"><div class="icon">📷</div></div>
        </div>
    </div>
    
    <div class="form-group">
        <label>💬 コメント（状態・暫定卸値 etc.）【任意】</label>
        <textarea id="userComment" placeholder="例：暫定卸値5000円、傷なし美品、箱付き"></textarea>
    </div>
    
    <button id="submitBtn" onclick="startAnalysis()">🔍 分析スタート</button>
    
    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">画像をアップロード中...</div>
    </div>

    <div id="result-box">
        <div class="result-title">📊 分析結果</div>
        <div class="result-item">
            <div class="result-label">特定された商品名</div>
            <div class="result-value" id="res-name">-</div>
        </div>
        <div class="result-item">
            <div class="result-label">相場価格（詳細は下記リンクよりご確認ください）</div>
            <div class="result-value price-highlight" id="res-price">-</div>
        </div>
        <div class="result-item">
            <div class="result-label">ヤフオク出品オススメ度</div>
            <div class="result-value stars" id="res-stars">-</div>
        </div>
        <div class="result-item">
            <div class="result-label">アドバイス</div>
            <div class="result-value" id="res-advice" style="line-height: 1.5; font-size: 14px; white-space: pre-wrap;">-</div>
        </div>
        <a id="marketBtn" href="#" target="_blank">📊 ヤフオク落札相場を直接確認</a>
    </div>
</div>

<script>
// ⚠️ 最新のGASウェブアプリURLをここに貼り付けてください
const GAS_SATEI_URL = "https://script.google.com/macros/s/AKfycbzyO5iW6MWGLAfyMEIbmE4fm30I9cYU3aYQ4GXszGzehjfTBrfLtYM1Aq6TtFQDX8mu/exec";

let selectedFilesArray = [];

function handleFileSelect(input) {
    if (!input.files || input.files.length === 0) return;
    
    const files = Array.from(input.files);
    if (files.length > 6) {
        alert("一度に選択できるのは最大6枚までです。自動的に最初の6枚が選ばれます。");
    }
    selectedFilesArray = files.slice(0, 6);
    
    for (let i = 1; i <= 6; i++) {
        const box = document.getElementById(`box${i}`);
        const existingImg = box.querySelector('img');
        if (existingImg) existingImg.remove();
        box.querySelector('.icon').style.display = 'block';
    }
    
    selectedFilesArray.forEach((file, index) => {
        const box = document.getElementById(`box${index + 1}`);
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        box.appendChild(img);
        box.querySelector('.icon').style.display = 'none';
    });
}

// 💡 修正ポイント：Base64テキストではなく、生の「Blobファイル」として縮小画像を切り出すロジック
function resizeToBlob(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                const max_size = 1200;

                if (width > height) {
                    if (width > max_size) {
                        height *= max_size / width;
                        width = max_size;
                    }
                } else {
                    if (height > max_size) {
                        width *= max_size / height;
                        height = max_size;
                    }
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                // テキスト変換せず、生のバイナリBlobとして出力（データサイズが1.3倍に太るのを防ぐ）
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg', 0.8);
            };
            img.src = e.target.result;
        };
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
    });
}

async function startAnalysis() {
    if (selectedFilesArray.length === 0) {
        alert('最低1枚は画像を選んでください！');
        return;
    }
    
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const resultBox = document.getElementById('result-box');
    const comment = document.getElementById('userComment').value;
    
    btn.disabled = true;
    loading.style.display = 'block';
    resultBox.style.display = 'none';
    
    document.getElementById('loading-text').innerText = "画像をアップロード中...";
    
    try {
        // 💡 修正ポイント：FormDataを使って生のファイルをそのまま詰め込む（最速送信）
        const formData = new FormData();
        formData.append('comment', comment);

        for (let i = 0; i < selectedFilesArray.length; i++) {
            const f = selectedFilesArray[i];
            const compressedBlob = await resizeToBlob(f);
            // file1, file2... という名前で生の画像バイナリを添付
            formData.append(`file${i + 1}`, compressedBlob, `image_${i + 1}.jpg`);
        }
        
        try {
            // FormData形式でGASへ爆速直送送信
            await fetch(GAS_SATEI_URL, {
                method: 'POST',
                body: formData
            });
        } catch (postError) {
            console.log("データ送信完了");
        }
        
        document.getElementById('loading-text').innerText = "データ送信完了！\nAIが分析中...";
        
        checkResultInterval();
        
    } catch (error) {
        alert('エラーが発生しました: ' + error.toString());
        btn.disabled = false;
        loading.style.display = 'none';
    }
}

function checkResultInterval() {
    let attemptCount = 0;
    const interval = setInterval(async () => {
        attemptCount++;
        if (attemptCount > 30) {
            clearInterval(interval);
            alert("タイムアウトしました。スプレッドシートをご確認ください。");
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('loading').style.display = 'none';
            return;
        }

        try {
            const response = await fetch(GAS_SATEI_URL + "?check=true");
            const result = await response.json();
            
            if (result.status === "success") {
                clearInterval(interval);
                
                document.getElementById('res-name').innerText = result.productName;
                document.getElementById('res-price').innerText = result.price_range;
                document.getElementById('res-stars').innerText = result.starRating;
                document.getElementById('res-advice').innerText = result.advice;
                
                const mBtn = document.getElementById('marketBtn');
                if (result.searchUrl) {
                    mBtn.href = result.searchUrl;
                    mBtn.style.display = 'block';
                } else {
                    mBtn.style.display = 'none';
                }
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
                
                const rBox = document.getElementById('result-box');
                rBox.style.display = 'block';
                rBox.scrollIntoView({ behavior: 'smooth' });
            }
        } catch (e) {
            // エラー時は次をトライ
        }
    }, 3000);
}
</script>

</body>
</html>
